<svg width="1000" height="180" viewBox="0 0 1000 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <path id="orbitOuter" d="M105 88C250 15 750 15 895 88C750 161 250 161 105 88Z"/>
    <path id="orbitInner" d="M245 88C345 43 655 43 755 88C655 133 345 133 245 88Z"/>
    <mask id="crescentMask">
      <rect width="1000" height="180" fill="black"/>
      <circle cx="500" cy="76" r="32" fill="white"/>
      <circle cx="514" cy="65" r="32" fill="black"/>
    </mask>
  </defs>

  <ellipse cx="500" cy="88" rx="395" ry="73" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.10">
    <animate attributeName="stroke-opacity" values="0.08;0.22;0.08" dur="7s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="500" cy="88" rx="255" ry="45" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.16">
    <animate attributeName="stroke-opacity" values="0.18;0.06;0.18" dur="5.5s" repeatCount="indefinite"/>
  </ellipse>

  <circle cx="500" cy="76" r="32" fill="#FFFFFF" mask="url(#crescentMask)"/>
  <circle cx="500" cy="76" r="39" stroke="#FFFFFF" stroke-opacity="0.08">
    <animate attributeName="r" values="37;44;37" dur="4.8s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.12;0.02;0.12" dur="4.8s" repeatCount="indefinite"/>
  </circle>

  <circle r="3.1" fill="#FFFFFF">
    <animateMotion dur="10s" repeatCount="indefinite" rotate="auto">
      <mpath href="#orbitOuter"/>
    </animateMotion>
  </circle>
  <circle r="2.1" fill="#BFC7D1">
    <animateMotion dur="6.5s" begin="-2s" repeatCount="indefinite" rotate="auto">
      <mpath href="#orbitInner"/>
    </animateMotion>
  </circle>

  <g fill="#FFFFFF">
    <circle cx="128" cy="28" r="1.5">
      <animate attributeName="opacity" values="0.12;0.95;0.12" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="214" cy="143" r="1.2">
      <animate attributeName="opacity" values="0.15;0.7;0.15" dur="4.1s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="352" cy="25" r="1.4">
      <animate attributeName="opacity" values="0.1;0.85;0.1" dur="3.7s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="668" cy="31" r="1.2">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="4.6s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="797" cy="139" r="1.5">
      <animate attributeName="opacity" values="0.1;0.85;0.1" dur="3.5s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="889" cy="36" r="1.2">
      <animate attributeName="opacity" values="0.12;0.75;0.12" dur="4s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="13" letter-spacing="1.4" text-anchor="middle" fill="#FFFFFF">
    <text x="500" y="161" opacity="0">PRODUCTION WEB PRODUCTS
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.08;0.28;0.36;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="500" y="161" opacity="0">AI EXPERIMENTS + AUTOMATION
      <animate attributeName="opacity" values="0;0;0;1;1;0;0" keyTimes="0;0.30;0.36;0.42;0.61;0.67;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="500" y="161" opacity="0">DESIGN-LED CLIENT PROTOTYPES
      <animate attributeName="opacity" values="0;0;0;1;1;0" keyTimes="0;0.61;0.67;0.73;0.94;1" dur="9s" repeatCount="indefinite"/>
    </text>
  </g>
</svg>