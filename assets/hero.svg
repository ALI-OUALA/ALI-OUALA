<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-label="Ouala Eddine — applied mathematics, AI, web and design">
<defs>
  <style>
    .bg{fill:#0d1117}
    .border{fill:none;stroke:#30363d;stroke-width:1}
    .moonline{font:14px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#f0f6fc}
    .title{font:700 52px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#f0f6fc;letter-spacing:3px}
    .sub{font:400 17px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#b1bac4;letter-spacing:1.5px}
    .meta{font:400 13px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#7d8590;letter-spacing:1.25px}
    .motto{font:400 14px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#f0f6fc;letter-spacing:.7px}
    .star{font:16px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#f0f6fc;animation:twinkle 4.6s ease-in-out infinite}
    .d1{animation-delay:.7s}.d2{animation-delay:1.8s}.d3{animation-delay:2.6s}
    .moon{animation:drift 8s ease-in-out infinite}
    .intro{animation:fadeup .9s cubic-bezier(.2,.75,.2,1) both}
    .rule{stroke:#f0f6fc;stroke-opacity:.35;stroke-width:1;stroke-dasharray:220;stroke-dashoffset:220;animation:draw 1.2s .7s ease forwards}
    .cursor{fill:#f0f6fc;animation:blink 1.1s steps(1,end) infinite}
    .meteor{animation:meteor 11s ease-in-out infinite}
    @keyframes twinkle{0%,100%{opacity:.15}50%{opacity:1}}
    @keyframes drift{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
    @keyframes fadeup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes draw{to{stroke-dashoffset:0}}
    @keyframes blink{0%,46%{opacity:1}47%,100%{opacity:0}}
    @keyframes meteor{0%,72%{opacity:0;transform:translate(-110px,-55px)}75%{opacity:1}82%{opacity:0;transform:translate(220px,90px)}100%{opacity:0}}
    @media(prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>
  <linearGradient id="meteorTail" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#f0f6fc" stop-opacity="0"/>
    <stop offset="1" stop-color="#f0f6fc" stop-opacity=".9"/>
  </linearGradient>
</defs>
<rect class="bg" width="1200" height="430" rx="24"/>
<rect class="border" x=".5" y=".5" width="1199" height="429" rx="23.5"/>

<g aria-hidden="true">
  <text x="42" y="44" class="star">.</text>
  <text x="430" y="68" class="star d1">*</text>
  <text x="505" y="336" class="star d2">.</text>
  <text x="1130" y="84" class="star d3">+</text>
  <text x="1035" y="360" class="star d1">*</text>
  <text x="796" y="48" class="star d2">.</text>
  <text x="1160" y="216" class="star d3">.</text>
  <text x="468" y="190" class="star d1">+</text>
  <g class="meteor">
    <line x1="805" y1="28" x2="862" y2="58" stroke="url(#meteorTail)" stroke-width="1.2"/>
    <text x="862" y="61" class="star">*</text>
  </g>
</g>

<g class="moon" xml:space="preserve">
<text x="64" y="48.0" class="moonline"></text>
<text x="64" y="63.1" class="moonline">               ==+++++===-:</text>
<text x="64" y="78.2" class="moonline">            =+++**+**++++==-:.</text>
<text x="64" y="93.3" class="moonline">           +***##*****+*+=+=--:</text>
<text x="64" y="108.4" class="moonline">          +*#*######*#**+++=--:.</text>
<text x="64" y="123.5" class="moonline">         +*###%#*#%####*+++==--:.</text>
<text x="64" y="138.6" class="moonline">        +*#####+-+#####***+==--::.</text>
<text x="64" y="153.7" class="moonline">       ++*###%%#*#####*#*+++=--:...</text>
<text x="64" y="168.8" class="moonline">       +*####%##%####***=-=+==-:...</text>
<text x="64" y="183.9" class="moonline">       +*#*####%%####**#+=++==-::..</text>
<text x="64" y="199.0" class="moonline">       +***#%########***+++===-::..</text>
<text x="64" y="214.1" class="moonline">       +**#*=*%#####*#**++===-:::..</text>
<text x="64" y="229.2" class="moonline">       ++*#########****+++===-::...</text>
<text x="64" y="244.3" class="moonline">       ==+***###*+=+**+++===-:::...</text>
<text x="64" y="259.4" class="moonline">       -=+++***#+=:=+*++===--::....</text>
<text x="64" y="274.5" class="moonline">        ===++++*+===+++=-=:..:....</text>
<text x="64" y="289.6" class="moonline">         -=++=++++++====---::....</text>
<text x="64" y="304.7" class="moonline">          -=========-=----:.....</text>
<text x="64" y="319.8" class="moonline">           :--=--=----::::.....</text>
<text x="64" y="334.9" class="moonline">            .:::--::::........</text>
<text x="64" y="350.0" class="moonline">               ............</text>
</g>

<g class="intro">
  <text x="575" y="137" class="title">OUALA EDDINE</text>
  <text x="578" y="181" class="sub">MATH · AI · WEB · DESIGN</text>
  <line x1="578" y1="210" x2="798" y2="210" class="rule"/>
  <text x="578" y="249" class="meta">PRODUCTION PRODUCTS / TECHNICAL EXPERIMENTS</text>
  <text x="578" y="283" class="meta">ALGIERS, ALGERIA</text>
  <rect x="746" y="266" width="8" height="18" class="cursor"/>
  <text x="578" y="322" class="motto">DREAM TO REACH THE STARS. YOU WILL REACH THE MOON.</text>
</g>
</svg>